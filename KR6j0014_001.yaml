body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯稽首無礙智密教意生子依彼蘇多羅攝此隨行法真言行菩薩無住無等誓語密身俱密後作相應行三昧耶真言曰娜莫三滿多母馱引南引一唵引阿上聲三去聲銘二底哩二合三去聲銘三三去聲麼鼻音曳引四娑嚩二合引賀引契謂齊諸輪密合建二空五處頂肩心最後加咽位次結法界生密慧之幖幟淨身口意業遍轉於其身法界生真言曰娜莫三去聲滿多母馱引南引一達磨上聲馱引暏娑嚩二合引婆去聲引嚩句引憾二般若三昧手俱作金剛拳相逼建風幢端直令相合是名為法界清淨之密印如法界自性而觀於己身無垢同虛空真言印威力次結轉法輪金剛薩埵印此殊勝加持令彼獲堅固止觀手相背地水火風輪左右互相持二空各旋轉合於慧掌內名最勝法輪金剛薩埵真言曰娜莫三去聲滿多嚩日囉二合引喃引一嚩日囉二合引怛麼二合句引憾正誦此密言當住於等引諦觀自身像即是執金剛無量衆大魔諸有親見者如金剛薩埵勿生疑惑心次以無動聖辟障及除垢而能淨衆事結護隨相應不動尊真言曰娜莫三去聲滿多嚩日囉二合引喃一戰拏摩賀引嚧引灑拏鼻音颯頗二合引吒耶吽引怛囉二合吒半音呼憾引𤚥引定空加地水風火竪於心慧劍亦如是出鞘能成辦次以如來鉤請尊及聖衆密方便相應依本誓而降如來鉤真言曰娜莫三去聲滿多母馱引喃引惡引薩嚩怛囉二合引鉢囉二合底丁以反賀帝怛他去聲引蘖黨引矩捨冒引地拶哩耶二合跛哩布引囉迦娑嚩二合引賀引止觀內相叉竪合智風竪才屈於初分餘輪狀若環聖者悲願力隨請咸來降奉現三昧耶明契如前說既呈本誓日決定相應故次當隨力分供養表誠心閼伽香食燈下至一花水或但運心想殊勝最難量當以普通印觀行及真言有表無表俱一切皆成就普通真言曰娜莫三去滿多母馱引喃引薩嚩他去聲引缺平聲二嗢娜蘖帝二合颯頗二合囉呬聲異切𤚥引誐誐曩劍平聲娑嚩二合引賀定慧手齊合右交於上節運心普周遍所念皆現前即施供養已修常作持誦先擐金剛鎧結護事相應金剛甲胄真言曰娜莫三去聲滿多嚩日囉二合引喃引嚩日囉二合迦嚩左吽引先作虛心合風輪糾持火大空依火本遍觸後居心次結方隅界用前不動尊左轉成辟除右旋及上下備觸身支分結護悉堅牢真語母陀羅如前已分別既為嚴備訖當示根本契還加於五處七轉或再三散印頂上開半跏正身意或作相應坐隨方如教說正面住身前覩一圓明像清淨無瑕玷猶如滿月輪中有本尊形妙色超三界紗縠嚴身服寶冠紺髮垂寂然三摩地輝焰過衆電猶如淨鏡內幽邃現真容喜怒顯形色操持與願等正受相應身明了心無亂無相淨法體應願濟群生專注而念持限數既終畢懈極後方息復結普通印虔誠啓願等殷重禮聖尊左轉無動力解前所結護還呈本尊契頂上散開之心送於聖天五輪投地禮然起隨衆善後會復如初一時與二三或四皆如此餘分旋繞塔浴像轉大乘塗飾曼荼羅布花讚佛德或復無雜念專注於等引以此淨三業悉地速現前聖力所加持行願相應故諸有樂修習隨師而受學持明傳本教無越三昧耶勤策無間修離蓋及熏醉順行諸學處悉地隨力成我依大日經略示瑜伽行修證殊勝福普潤諸有情
